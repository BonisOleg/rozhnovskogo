{% load static %}
<form
  class="form"
  hx-post="{% url 'landing:lead' %}"
  hx-target="#lead-form-area"
  hx-swap="innerHTML"
  novalidate
>
  {% csrf_token %}
  <input type="hidden" name="lang" value="{{ lang|default:'uk' }}">

  <div class="form__group">
    <label class="form__label" for="lead-name">{{ t.form_name_label }}</label>
    <input
      class="form__input"
      type="text"
      id="lead-name"
      name="name"
      placeholder="{{ t.form_name_placeholder }}"
      required
      autocomplete="given-name"
    >
  </div>

  <div class="form__group">
    <label class="form__label" for="lead-phone">{{ t.form_phone_label }}</label>
    <input
      class="form__input"
      type="tel"
      id="lead-phone"
      name="phone"
      placeholder="+380 __ ___ __ __"
      required
      autocomplete="tel"
      inputmode="tel"
    >
  </div>

  <div class="form__group">
    <span class="form__label" id="interest-label">{{ t.form_interest_label }}</span>
    <div class="form__radio-group" role="radiogroup" aria-labelledby="interest-label">
      <label class="form__radio">
        <input type="radio" name="interest" value="buy" checked> {{ t.form_interest_towers }}
      </label>
      <label class="form__radio">
        <input type="radio" name="interest" value="sell"> {{ t.form_interest_boilers }}
      </label>
      <label class="form__radio">
        <input type="radio" name="interest" value="estimate"> {{ t.form_interest_metal }}
      </label>
    </div>
  </div>

  <button type="submit" class="btn btn--gold form__submit">
    {{ contact.form_btn_text }}
  </button>

  <p class="form__privacy">{{ contact.privacy_note }}</p>
</form>
