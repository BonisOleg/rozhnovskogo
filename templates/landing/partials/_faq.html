<section class="section faq parallax-section" id="faq" aria-labelledby="faq-title">
  <div class="container">
    <span class="section-label">{{ t.section_faq }}</span>
    <h2 class="section-title" id="faq-title">{{ t.faq_title }}</h2>
    <div class="faq__list">
      {% for item in t.faq_items %}
      <details class="faq__item js-reveal">
        <summary class="faq__question">
          {{ item.q }}
          <span class="faq__icon" aria-hidden="true"></span>
        </summary>
        <div class="faq__answer">
          <p>{{ item.a }}</p>
        </div>
      </details>
      {% endfor %}
    </div>
  </div>
</section>
