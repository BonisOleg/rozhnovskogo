<section class="stats" id="stats" aria-label="Наша статистика">
  <div class="container">
    <div class="stats__grid" role="list">
      {% for stat in stats %}
      <div class="stat-item js-reveal" role="listitem">
        <span class="stat-item__value">{{ stat.value }}</span>
        <span class="stat-item__label">{{ stat.label }}</span>
        <div class="stats__divider" aria-hidden="true"></div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
