{% load static %}
<div
  class="modal-overlay"
  id="hero-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modal-title"
>
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="modal-title">{{ t.modal_title }}</h2>
      <button class="modal__close" id="modal-close-btn" aria-label="{{ t.modal_close_label }}">&times;</button>
    </div>

    <div class="modal__body">
      <div id="modal-form-area">
        <form
          class="form"
          hx-post="{% url 'landing:lead' %}"
          hx-target="#modal-form-area"
          hx-swap="innerHTML"
          novalidate
        >
          {% csrf_token %}
          <input type="hidden" name="lang" value="{{ lang|default:'uk' }}">

          <div class="form__group">
            <label class="form__label" for="modal-lead-name">{{ t.form_name_label }}</label>
            <input
              class="form__input"
              type="text"
              id="modal-lead-name"
              name="name"
              placeholder="{{ t.form_name_placeholder }}"
              required
              autocomplete="given-name"
            >
          </div>

          <div class="form__group">
            <label class="form__label" for="modal-lead-phone">{{ t.form_phone_label }}</label>
            <input
              class="form__input"
              type="tel"
              id="modal-lead-phone"
              name="phone"
              placeholder="+380 __ ___ __ __"
              required
              autocomplete="tel"
              inputmode="tel"
            >
          </div>

          <div class="form__group">
            <span class="form__label" id="modal-interest-label">{{ t.form_interest_label }}</span>
            <div class="form__radio-group" role="radiogroup" aria-labelledby="modal-interest-label">
              <label class="form__radio">
                <input type="radio" name="interest" value="buy" id="modal-radio-buy" checked> {{ t.form_interest_towers }}
              </label>
              <label class="form__radio">
                <input type="radio" name="interest" value="sell" id="modal-radio-sell"> {{ t.form_interest_boilers }}
              </label>
              <label class="form__radio">
                <input type="radio" name="interest" value="estimate"> {{ t.form_interest_metal }}
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn--gold form__submit">
            {{ contact.form_btn_text }}
          </button>

          <p class="form__privacy">{{ contact.privacy_note }}</p>
        </form>
      </div>
    </div>
  </div>
</div>

<div
  class="modal-overlay"
  id="phone-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="phone-modal-title"
>
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="phone-modal-title">{{ t.contact_hotline }}</h2>
      <button class="modal__close" id="phone-modal-close-btn" aria-label="{{ t.modal_close_label }}">&times;</button>
    </div>

    <div class="modal__body">
      <div class="phone-modal-list">
        {% if site.phone %}
          <a href="tel:{{ site.phone }}" class="phone-modal-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
            {{ site.phone }}
          </a>
        {% endif %}
        {% if site.phone2 %}
          <a href="tel:{{ site.phone2 }}" class="phone-modal-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
            {{ site.phone2 }}
          </a>
        {% endif %}
      </div>
    </div>
  </div>
</div>
