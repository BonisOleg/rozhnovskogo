<section class="section parallax-section-alt" id="services" aria-label="{{ t.section_services }}">
  <div class="container">
    <span class="section-label">{{ t.section_services }}</span>
    <h2 class="section-title">{{ services_section.title }}</h2>

    <div class="services__grid" style="margin-top: 3rem;">
      {% for item in service_items %}
      <div class="service-card js-reveal">
        <span class="service-card__num" aria-hidden="true">{{ forloop.counter }}</span>
        <div class="service-card__body">
          <h3 class="service-card__title">{{ item.title }}</h3>
          <p class="service-card__text">{{ item.description }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
