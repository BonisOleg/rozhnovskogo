{% load static %}
<section class="hero parallax-section" id="hero" aria-label="{{ hero.title }}">
  <div class="container">
    <div class="hero__inner">
      <div class="hero__badge" aria-hidden="true">
        <span>{{ t.badge.0 }}</span>
        <span>·</span>
        <span>{{ t.badge.1 }}</span>
        <span>·</span>
        <span>{{ t.badge.2 }}</span>
      </div>

      <div class="hero__logo-mini-placeholder" style="display: none;">ЛОГО</div>

      <h1 class="hero__title">{{ hero.title }}</h1>

      <p class="hero__subtitle">{{ hero.subtitle }}</p>

      <div class="hero__actions">
        <button class="btn btn--gold" data-modal-interest="buy">{{ hero.btn_buy_text }}</button>
        <button class="btn btn--gold" data-modal-interest="sell">{{ hero.btn_sell_text }}</button>
      </div>

      <div class="hero__scroll" aria-hidden="true">
        <span class="hero__scroll-line"></span>
        <span>{{ t.hero_scroll }}</span>
      </div>
    </div>
  </div>
</section>
