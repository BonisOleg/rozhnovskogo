<!doctype html>
<html lang="{{ lang|default:'uk' }}">
{% load static %}
<head>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-KKZDJTNH');</script>
  <!-- End Google Tag Manager -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#001f3f">
  <title>{% block title %}{{ t.meta_title }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ t.meta_description }}{% endblock %}">
  <meta property="og:title" content="{{ t.og_title|default:t.meta_title }}">
  <meta property="og:description" content="{{ t.meta_description }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{% if lang == 'ru' %}ru_UA{% else %}uk_UA{% endif %}">

  <link rel="icon" type="image/webp" href="{% static 'images/favicon.webp' %}">

  <link rel="preload" as="image" href="{% static 'images/desk.webp' %}" fetchpriority="high" media="(min-width: 769px)">
  <link rel="preload" as="image" href="{% static 'images/mob.webp' %}" fetchpriority="high" media="(max-width: 768px)">
  <link rel="preload" as="style" href="{% static 'css/base.css' %}">
  <link rel="preload" as="style" href="{% static 'css/layout.css' %}">
  <link rel="preload" as="style" href="{% static 'css/hero.css' %}">
  <link rel="preload" as="style" href="{% static 'css/sections.css' %}">
  <link rel="preload" as="style" href="{% static 'css/services.css' %}">
  <link rel="preload" as="style" href="{% static 'css/stats.css' %}">
  <link rel="preload" as="style" href="{% static 'css/contact.css' %}">
  <link rel="preload" as="style" href="{% static 'css/mobile.css' %}">
  <link rel="preload" as="style" href="{% static 'css/new-sections.css' %}">
  <link rel="preload" as="style" href="{% static 'css/thank_you.css' %}" media="screen and (min-width: 1px)">>
  
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout.css' %}">
  <link rel="stylesheet" href="{% static 'css/hero.css' %}">
  <link rel="stylesheet" href="{% static 'css/sections.css' %}">
  <link rel="stylesheet" href="{% static 'css/services.css' %}">
  <link rel="stylesheet" href="{% static 'css/stats.css' %}">
  <link rel="stylesheet" href="{% static 'css/contact.css' %}">
  <link rel="stylesheet" href="{% static 'css/mobile.css' %}">
  <link rel="stylesheet" href="{% static 'css/new-sections.css' %}">
  <link rel="stylesheet" href="{% static 'css/thank_you.css' %}">>

  <script src="{% static 'js/htmx.min.js' %}" defer></script>
  <script src="{% static 'js/main.js' %}" defer></script>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KKZDJTNH"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

{% block body %}{% endblock %}

</body>
</html>
