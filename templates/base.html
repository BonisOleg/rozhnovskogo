<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1E4332">
  <title>{% block title %}Центр Земельних Аукціонів{% endblock %}</title>

  <script src="{% static 'js/htmx.min.js' %}" defer></script>

{% block body %}{% endblock %}
